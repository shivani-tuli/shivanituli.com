<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Shivani Tuli</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .poster-contact {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }

        .poster-contact h2 {
            margin-bottom: 0.5rem;
        }

        .contact-subtitle {
            color: #6b7280;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .contact-photo {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            object-position: center top;
            margin-bottom: 1.5rem;
        }

        .contact-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 0.25rem;
        }

        .contact-affiliation {
            color: #6b7280;
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .contact-links {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            align-items: center;
            margin-bottom: 2rem;
        }

        .contact-link-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.95rem;
        }

        .contact-link-item strong {
            color: #1a1a1a;
            min-width: 110px;
            text-align: right;
        }

        .contact-link-item a {
            color: #2563eb;
            text-decoration: none;
        }

        .contact-link-item a:hover {
            text-decoration: underline;
        }

        .contact-buttons {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }

        .contact-btn {
            display: inline-block;
            padding: 0.6rem 1.25rem;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .contact-btn:hover {
            background: #2563eb;
            color: #fff;
            border-color: #2563eb;
        }

        .back-link {
            display: inline-block;
            margin-top: 2rem;
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <main>
        <div class="container">
            <section class="poster-contact">
                <h2 class="section-title page-title" style="margin-top: 0;">Let's Connect</h2>

                <img src="assets/images/shivani_photo.png" alt="Shivani Tuli" class="contact-photo">

                <div class="contact-name">Shivani Tuli</div>
                <div class="contact-affiliation">
                    PhD Student, Bioengineering<br>
                    University of Pittsburgh — Gau Lab
                </div>

                <div class="contact-links">
                    <div class="contact-link-item">
                        <strong>Email</strong>
                        <a href="mailto:shivanituli@pitt.edu">shivanituli@pitt.edu</a>
                    </div>
                    <div class="contact-link-item">
                        <strong>Website</strong>
                        <a href="https://shivanituli.com" target="_blank">shivanituli.com</a>
                    </div>
                    <div class="contact-link-item">
                        <strong>Scholar</strong>
                        <a href="https://scholar.google.com/citations?user=O6MY_9oAAAAJ" target="_blank">Google
                            Scholar</a>
                    </div>
                    <div class="contact-link-item">
                        <strong>ORCID</strong>
                        <a href="https://orcid.org/0009-0004-2045-2466" target="_blank">0009-0004-2045-2466</a>
                    </div>
                </div>

                <div class="contact-buttons">
                    <a href="https://www.linkedin.com/in/shivanituli/" target="_blank" class="contact-btn">LinkedIn</a>
                    <a href="https://x.com/shivanituli21" target="_blank" class="contact-btn">X / Twitter</a>
                    <a href="mailto:shivanituli@pitt.edu" class="contact-btn">Send Email</a>
                </div>

                <a href="index.html" class="back-link">← Back to homepage</a>
            </section>
        </div>
    </main>

    <script src="js/components.js"></script>
</body>

</html>
